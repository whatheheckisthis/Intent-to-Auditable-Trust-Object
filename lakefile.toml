# lakefile.toml — Exhaustive helper / modern template for Intent-to-Auditable-Trust-Object
# Place this in the repository root (next to README.md).
# This root configuration points Lake at `lean/iato_v7` as the package source directory.

# ────────────────────────────────────────────────
# Package basics
# ────────────────────────────────────────────────
name = "Intent-to-Auditable-Trust-Object"
version = "0.7.0"

# Build these targets when running `lake build` with no explicit target.
defaultTargets = ["IATO_V7", "iato_v7_exe"]

# Use Lean sources from the existing Lean package subtree.
srcDir = "lean/iato_v7"

# ────────────────────────────────────────────────
# Global Lean options (applied package-wide)
# ────────────────────────────────────────────────
[leanOptions]
autoImplicit = false
"pp.unicode.fun" = true
"linter.unusedVariables" = false

# Additional CLI args forwarded to Lean while compiling package targets.
moreLeanArgs = [
  "-DwarningAsError=true",
  "-Dpp.unicode.fun=true",
]

# ────────────────────────────────────────────────
# Lean library target(s) — formal verification core
# ────────────────────────────────────────────────
[[lean_lib]]
name = "IATO_V7"
globs = ["IATO_V7.+", "IATO.+"]

# Optional additional library example:
# [[lean_lib]]
# name = "Helpers"
# globs = ["Helpers.+"]

# ────────────────────────────────────────────────
# Executable target(s) — entry points for scripts/tests
# ────────────────────────────────────────────────
[[lean_exe]]
name = "iato_v7_exe"
root = "Main"
supportInterpreter = true

# Optional executable examples:
# [[lean_exe]]
# name = "worker_scan"
# root = "Main"
#
# [[lean_exe]]
# name = "test_basic"
# root = "Test.Basic"

# ────────────────────────────────────────────────
# Dependencies
# ────────────────────────────────────────────────
[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "master"

# Optional dependency examples:
# [[require]]
# name = "aesop"
# scope = "leanprover-community"
# rev = "master"

# ────────────────────────────────────────────────
# Helper script registry (project documentation helper section)
# Note: this table is for maintainers; run these via shell, not `lake script`.
# ────────────────────────────────────────────────
[scripts]
scan_workers = "python3 scripts/scan_workers.py data/legacy_workers.csv"
build_evidence = "./scripts/lake_build.sh"
migrate_example = "./scripts/migrate.sh"

# ────────────────────────────────────────────────
# Advanced / optional examples
# Keep commented unless your team intentionally enables them.
# ────────────────────────────────────────────────
# leanVersion = "4.12.0"
# moreServerArgs = ["--server"]

# ────────────────────────────────────────────────
# IATO-V7 deterministic Nmap path-audit orchestration template
# ────────────────────────────────────────────────
[tool.iato_nmap]
headless = true
nmap_version = "7.94"
schema_version = "1.0.0"
root_path = "/workspace"
target = "127.0.0.1"
nse_script = "lean/iato_v7/nse/path_audit.nse"

[[tool.iato_nmap.path_rules]]
path = "lakefile.toml"
size = 3725
sha256 = "replace-with-canonical-digest"
uid = 1000
gid = 1000
permissions = "rw-r--r--"

[[tool.iato_nmap.path_rules]]
path = "lean/iato_v7/run-ci-proxy.sh"
sha256 = "replace-with-canonical-digest"
uid = 1000
gid = 1000
permissions = "rwxr-xr-x"
