apiVersion: batch/v1
kind: Job
metadata:
  name: iato-v7-lean-build
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: iato-v7
          image: docker.io/leanprover/lean4:stable
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
          env:
            - name: HTTP_PROXY
              value: ""
            - name: HTTPS_PROXY
              value: ""
            - name: NO_PROXY
              value: "localhost,127.0.0.1,::1,.svc,.cluster.local"
          command: ["/bin/sh", "-lc"]
          args:
            - >-
              lake update &&
              lake build &&
              lake test &&
              lake exe cache &&
              lake aot
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: workspace
          hostPath:
            path: /workspace
            type: Directory
